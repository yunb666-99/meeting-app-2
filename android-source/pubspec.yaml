name: meeting_app
description: MeetingApp - 视频会议系统
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 网络请求
  dio: ^5.6.0

  # 本地存储
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # LiveKit 视频会议
  livekit_client: ^2.3.3

  # WebSocket (聊天)
  socket_io_client: ^2.0.3+1

  # 权限管理
  permission_handler: ^11.3.1

  # JSON 序列化
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 工具
  intl: ^0.19.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
