workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
    scripts:
      - name: Setup Java and Build
        script: |
          set -e
          # 列出可用的 Java 版本
          /usr/libexec/java_home -V 2>&1 || true
          # 尝试用 Java 17，找不到用默认
          JAVA17=$(/usr/libexec/java_home -v 17 2>/dev/null || echo "")
          if [ -n "$JAVA17" ]; then
            export JAVA_HOME="$JAVA17"
            echo "Using Java 17: $JAVA_HOME"
          else
            echo "Java 17 not found, using default"
          fi
          java -version 2>&1
          flutter create --platforms=android --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build apk --release
    artifacts:
      - meeting_app/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Build iOS
        script: |
          set -e
          flutter create --platforms=ios --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - meeting_app/build/ios/iphoneos/Runner.app