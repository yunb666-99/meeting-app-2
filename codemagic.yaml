workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.27.0
    scripts:
      - name: Build
        script: |
          set -e
          flutter create --platforms=android --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cd meeting_app
          flutter pub get
          # 修复 flutter_webrtc Java bug
          F="$HOME/.pub-cache/hosted/pub.dev/flutter_webrtc-0.12.12+hotfix.1/android/src/main/java/com/cloudwebrtc/webrtc/SurfaceTextureRenderer.java"
          [ -f "$F" ] && sed -i '' 's/new TextureRegistry.SurfaceProducer.Callback() {/& public void onSurfaceCreated() {} /' "$F" && sed -i '' '/@Override/d' "$F"
          flutter build apk --release
    artifacts:
      - meeting_app/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.27.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Build
        script: |
          set -e
          flutter create --platforms=ios --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - meeting_app/build/ios/iphoneos/Runner.app