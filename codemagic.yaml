workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
    scripts:
      - name: Build
        script: |
          set -e
          flutter create --platforms=android --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cd meeting_app
          # 升级 Kotlin
          perl -i -pe 's/ext\.kotlin_version\s*=\s*"[^"]*"/ext.kotlin_version = "1.9.22"/' android/build.gradle 2>/dev/null || true
          flutter pub get
          # 修复 flutter_webrtc Java bug
          F=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -name "flutter_webrtc-*" -type d | head -1)
          if [ -n "$F" ]; then
            J="$F/android/src/main/java/com/cloudwebrtc/webrtc/SurfaceTextureRenderer.java"
            [ -f "$J" ] && sed -i '' 's/new TextureRegistry.SurfaceProducer.Callback() {/& public void onSurfaceCreated() {} public void onSurfaceDestroyed() {} /' "$J" && sed -i '' '/@Override/d' "$J"
          fi
          flutter build apk --release
    artifacts:
      - meeting_app/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Build
        script: |
          set -e
          flutter create --platforms=ios --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - meeting_app/build/ios/iphoneos/Runner.app