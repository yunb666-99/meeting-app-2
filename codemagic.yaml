workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      vars:
        JAVA_HOME: /Library/Java/JavaVirtualMachines/jdk-17.0.12.jdk/Contents/Home
    scripts:
      - name: Prepare and Build
        script: |
          set -e
          # 试试用 Java 17
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || echo $JAVA_HOME)
          java -version 2>&1 || true
          flutter create --platforms=android --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build apk --release
    artifacts:
      - meeting_app/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Prepare and Build
        script: |
          set -e
          flutter create --platforms=ios --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - meeting_app/build/ios/iphoneos/Runner.app