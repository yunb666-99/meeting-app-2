workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.27.0
    scripts:
      - name: Build
        script: |
          set -e
          flutter create --platforms=android --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cd meeting_app
          flutter pub get
          # 修复 flutter_webrtc Java bug（动态查找版本目录）
          F=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -name "flutter_webrtc-*" -type d 2>/dev/null | head -1)
          if [ -n "$F" ]; then
            echo "Patching $F"
            J="$F/android/src/main/java/com/cloudwebrtc/webrtc/SurfaceTextureRenderer.java"
            if [ -f "$J" ]; then
              sed -i '' 's/new TextureRegistry.SurfaceProducer.Callback() {/& public void onSurfaceCreated() {} public void onSurfaceDestroyed() {} /' "$J"
              sed -i '' '/@Override/d' "$J"
              echo "Patched"
            fi
          fi
          flutter build apk --release
    artifacts:
      - meeting_app/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.27.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Build
        script: |
          set -e
          flutter create --platforms=ios --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - meeting_app/build/ios/iphoneos/Runner.app