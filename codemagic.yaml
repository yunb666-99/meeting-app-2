workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: 3.24.0
    scripts:
      - name: Build APK
        script: |
          cd mobile
          flutter pub get
          flutter build apk --release
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 30
    environment:
      flutter: 3.24.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Build iOS
        script: |
          cd mobile
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - mobile/build/ios/iphoneos/Runner.app