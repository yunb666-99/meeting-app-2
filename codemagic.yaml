workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
    scripts:
      - name: Build APK
        script: |
          set -e
          flutter create --platforms=android --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          flutter pub get
          # 修复 flutter_webrtc Java 编译 bug
          WEBRTC_FILE="$HOME/.pub-cache/hosted/pub.dev/flutter_webrtc-0.12.12+hotfix.1/android/src/main/java/com/cloudwebrtc/webrtc/SurfaceTextureRenderer.java"
          if [ -f "$WEBRTC_FILE" ]; then
            echo "Patching flutter_webrtc..."
            # 1. 补上缺失的 onSurfaceCreated 方法
            sed -i '' 's/new TextureRegistry.SurfaceProducer.Callback() {/new TextureRegistry.SurfaceProducer.Callback() { \
                @Override \
                public void onSurfaceCreated() {} \
                @Override \
                public void onSurfaceDestroyed() {} /' "$WEBRTC_FILE"
            # 2. 删除文件里所有 @Override（避免"does not override"错误）
            sed -i '' '/@Override/d' "$WEBRTC_FILE"
            echo "Patch applied"
          fi
          flutter build apk --release
    artifacts:
      - meeting_app/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Build iOS
        script: |
          set -e
          flutter create --platforms=ios --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - meeting_app/build/ios/iphoneos/Runner.app