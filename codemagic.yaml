workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
    scripts:
      - name: Prepare and Build
        script: |
          set -e
          flutter create --platforms=android --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          # 升级 Gradle 到 8.7 以兼容 Java 21
          sed -i '' 's/gradle-7.6.3-all.zip/gradle-8.7-all.zip/' android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null || sed -i 's/gradle-7.6.3-all.zip/gradle-8.7-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          # 更新 Android Gradle Plugin 版本
          sed -i '' 's/com.android.tools.build:gradle:7.3.0/com.android.tools.build:gradle:8.3.0/' android/build.gradle 2>/dev/null || sed -i 's/com.android.tools.build:gradle:7.3.0/com.android.tools.build:gradle:8.3.0/' android/build.gradle
          flutter pub get
          flutter build apk --release
    artifacts:
      - meeting_app/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Prepare and Build
        script: |
          set -e
          flutter create --platforms=ios --org com.meetingapp meeting_app
          cp -r mobile/lib meeting_app/
          cp mobile/pubspec.yaml meeting_app/
          cp mobile/analysis_options.yaml meeting_app/
          cd meeting_app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - meeting_app/build/ios/iphoneos/Runner.app